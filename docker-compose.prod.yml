services:
  postgres:
    image: postgres:16-alpine
    container_name: capture_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: capture
      POSTGRES_USER: capture
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-capture}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capture -d capture"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: capture_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: capture_backend
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql://capture:${POSTGRES_PASSWORD:-capture}@postgres:5432/capture
      REDIS_URL: redis://redis:6379
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3001"

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: capture_frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
