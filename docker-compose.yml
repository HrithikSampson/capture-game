services:
  postgres:
    image: postgres:16-alpine
    container_name: capture_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: capture
      POSTGRES_USER: capture
      POSTGRES_PASSWORD: capture
    ports:
      - "5432:5432"
    # Note: if your local Postgres is on 5432, use 5433:5432 here and update DATABASE_URL accordingly
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capture -d capture"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: capture_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
